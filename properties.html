<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings | NaijaHomes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-navy text-white">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-navy py-3 sticky-top border-bottom border-gold-subtle">
        <div class="container">
            <a class="navbar-brand text-gold fw-bold fs-3" href="index.html">NaijaHomes</a>
    
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="properties.html">Listings</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
    
                    <li class="nav-item">
                        <a class="btn btn-gold btn-sm px-4 fw-bold" href="login.html">Login</a>
                    </li>
    
                    <li class="nav-item">
                        <a class="btn btn-outline-gold btn-sm px-4 signup-glow" href="signup.html">Signup</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <section class="py-5 text-center border-bottom border-secondary">
        <div class="container">
            <h1 class="fw-bold">Explore Properties in Ibadan</h1>
            <p class="text-secondary">Find lands, homes and apartments across prime locations</p>
        </div>
    </section>

    <!-- FILTER BAR -->
    <section class="py-4 bg-dark-navy border-bottom border-secondary">
        <div class="container">
            <div class="row g-3">

                <div class="col-md-4">
                    <input type="text" id="searchInput" class="form-control"
                        placeholder="Search by location...">
                </div>

                <div class="col-md-3">
                    <select id="priceFilter" class="form-control">
                        <option value="">Price Range</option>
                        <option value="50000000">Below ₦50M</option>
                        <option value="100000000">Below ₦100M</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select class="form-control" id="typeFilter">
                        <option>Property Type</option>
                        <option>Apartment</option>
                        <option>Land</option>
                        <option>Duplex</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-gold w-50" onclick="filterProperties()">Search</button>
                </div>

            </div>
        </div>
    </section>

    <!-- LISTINGS -->
    <section class="py-5">
        <div class="container">
            <div class="row g-4" id="allProperties"></div>
        </div>
    </section>

    <script src="properties.js"></script>
    <script src="properties-page.js"></script>

</body>

</html>
